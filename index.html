<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - El Espacio</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
  </head>
  <body>
    <a-scene background="color: #000000" vr-mode-ui="enabled: false">
      <a-sky color="#000000"></a-sky>
      
      <a-entity light="type: ambient; intensity: 0.3"></a-entity>
      
      <a-entity position="0 2 25">
        <a-camera look-controls="enabled: true" wasd-controls="enabled: true"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearEstrella(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error en la conexión:", error);
        }
      }

      function crearEstrella(palabra) {
        const universo = document.querySelector('#universo');
        const colores = ['#00f2ff', '#ff00ff', '#00ffaa', '#ffcc00', '#0077ff'];
        const colorAzar = colores[Math.floor(Math.random() * colores.length)];

        const x = (Math.random() - 0.5) * 65;
        const y = (Math.random() * 25) - 5;
        const z = (Math.random() - 0.5) * 20;

        const grupo = document.createElement('a-entity');
        grupo.setAttribute('position', `${x} ${y} -110`); 

        // 1. Núcleo de la estrella
        const esfera = document.createElement('a-sphere');
        esfera.setAttribute('radius', '0.12');
        esfera.setAttribute('color', '#fff');
        esfera.setAttribute('material', `emissive: ${colorAzar}; emissiveIntensity: 10`);

        // 2. Capa de Brillo (Glow trasero)
        const brillo = document.createElement('a-text');
        brillo.setAttribute('value', palabra);
        brillo.setAttribute('align', 'center');
        brillo.setAttribute('position', '0 1.6 -0.1');
        brillo.setAttribute('scale', '11 11 11'); 
        brillo.setAttribute('color', colorAzar);
        brillo.setAttribute('shader', 'msdf');
        brillo.setAttribute('negate', 'false');

        // 3. CAPA DE LECTURA (Blanco con Borde Negro Grueso)
        const texto = document.createElement('a-text');
        texto.setAttribute('value', palabra);
        texto.setAttribute('align', 'center');
        texto.setAttribute('position', '0 1.6 0');
        texto.setAttribute('scale', '10 10 10');
        texto.setAttribute('color', '#FFFFFF');
        texto.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        texto.setAttribute('shader', 'msdf');
        texto.setAttribute('negate', 'false');
        
        // Propiedades de contorno negro para separar las letras
        texto.setAttribute('wrap-count', '20');
        texto.setAttribute('outline-width', '0.15'); // Grosor del borde negro
        texto.setAttribute('outline-color', '#000000'); // Color negro sólido

        grupo.appendChild(esfera);
        grupo.appendChild(brillo);
        grupo.appendChild(texto);
        universo.appendChild(grupo);

        grupo.setAttribute('animation', {
          property: 'position',
          to: `${x} ${y} ${z}`,
          dur: 10000,
          easing: 'easeOutExpo'
        });
      }

      setInterval(actualizarEstrellas, 5000);
      actualizarEstrellas();
    </script>
  </body>
</html>
