<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - El Espacio</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; cursor: grab; }
      body:active { cursor: grabbing; }
    </style>
  </head>
  <body>
    <a-scene background="color: #000000" vr-mode-ui="enabled: false" renderer="antialias: true; colorManagement: true;">
      <a-sky color="#000000"></a-sky>
      <a-entity light="type: ambient; intensity: 0.6"></a-entity>
      
      <a-entity position="0 2 25">
        <a-camera look-controls="enabled: true" wasd-controls="enabled: true"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearEstrella(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error estelar:", error);
        }
      }

      function crearEstrella(palabra) {
        const universo = document.querySelector('#universo');
        const colores = ['#00f2ff', '#ff00ff', '#00ffaa', '#ffcc00', '#0077ff'];
        const colorAzar = colores[Math.floor(Math.random() * colores.length)];

        const x = (Math.random() - 0.5) * 110;
        const y = (Math.random() * 45) - 10;
        const z = (Math.random() - 0.5) * 60;

        const grupo = document.createElement('a-entity');
        grupo.setAttribute('position', `${x} ${y} -150`); 

        // 1. ESTRELLA
        const esfera = document.createElement('a-sphere');
        esfera.setAttribute('radius', '0.15');
        esfera.setAttribute('color', colorAzar);
        esfera.setAttribute('material', `emissive: ${colorAzar}; emissiveIntensity: 5`);

        // 2. TEXTO BASE (El borde blanco nítido)
        const borde = document.createElement('a-text');
        borde.setAttribute('value', palabra);
        borde.setAttribute('align', 'center');
        borde.setAttribute('position', '0 2.5 -0.05'); // Un toque atrás
        borde.setAttribute('scale', '16.2 16.2 16.2'); // Apenas más grande
        borde.setAttribute('color', '#FFFFFF'); // BLANCO
        borde.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        borde.setAttribute('shader', 'msdf');
        borde.setAttribute('negate', 'false');

        // 3. TEXTO FRONTAL (El interior negro puro)
        const interior = document.createElement('a-text');
        interior.setAttribute('value', palabra);
        interior.setAttribute('align', 'center');
        interior.setAttribute('position', '0 2.5 0'); // Al frente
        interior.setAttribute('scale', '16 16 16');
        interior.setAttribute('color', '#000000'); // NEGRO PURO
        interior.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        interior.setAttribute('shader', 'msdf');
        interior.setAttribute('negate', 'false');

        // 4. EL GLOW (Resplandor de color al fondo)
        const glow = document.createElement('a-text');
        glow.setAttribute('value', palabra);
        glow.setAttribute('align', 'center');
        glow.setAttribute('position', '0 2.5 -0.15');
        glow.setAttribute('scale', '17 17 17');
        glow.setAttribute('color', colorAzar);
        glow.setAttribute('shader', 'msdf');
        glow.setAttribute('negate', 'false');

        grupo.appendChild(esfera);
        grupo.appendChild(glow);
        grupo.appendChild(borde);
        grupo.appendChild(interior);
        universo.appendChild(grupo);

        grupo.setAttribute('animation', {
          property: 'position',
          to: `${x} ${y} ${z}`,
          dur: 12000,
          easing: 'easeOutExpo'
        });
      }

      setInterval(actualizarEstrellas, 5000);
      actualizarEstrellas();
    </script>
  </body>
</html>
