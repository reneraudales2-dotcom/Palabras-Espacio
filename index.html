<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - Versión Estándar</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; cursor: grab; }
      body:active { cursor: grabbing; }
    </style>
  </head>
  <body>
    <a-scene background="color: #000000" vr-mode-ui="enabled: false">
      
      <a-sky color="#000000" src="https://cdn.glitch.global/e8229b46-0b13-43c3-8a35-430c00711915/nebulosa_profunda.jpg?v=1716386623" opacity="0.6" rotation="0 -90 0"></a-sky>
      
      <a-entity light="type: ambient; intensity: 1.5"></a-entity>
      
      <a-entity position="0 2 25">
        <a-camera look-controls="enabled: true; pointerLockEnabled: false" wasd-controls="enabled: true"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearEstrella(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error de conexión:", error);
        }
      }

      function crearEstrella(palabra) {
        const universo = document.querySelector('#universo');
        if (!universo) return;

        const x = (Math.random() - 0.5) * 120;
        const y = (Math.random() * 45) - 5;
        const z = (Math.random() - 0.5) * 70;

        const grupo = document.createElement('a-entity');
        grupo.setAttribute('position', `${x} ${y} -150`); 

        // Letras: Blanco con contorno negro (Máxima legibilidad)
        const texto = document.createElement('a-text');
        texto.setAttribute('value', palabra);
        texto.setAttribute('align', 'center');
        texto.setAttribute('scale', '25 25 25'); 
        texto.setAttribute('color', '#FFFFFF'); 
        
        // Usamos la fuente interna de A-Frame para evitar bloqueos de carga externa
        texto.setAttribute('font', 'roboto'); 
        texto.setAttribute('shader', 'msdf');
        texto.setAttribute('negate', 'false');
        
        // Contorno negro para separar de la nebulosa
        texto.setAttribute('outline-width', '0.25'); 
        texto.setAttribute('outline-color', '#000000');

        grupo.appendChild(texto);
        universo.appendChild(grupo);

        grupo.setAttribute('animation', {
          property: 'position',
          to: `${x} ${y} ${z}`,
          dur: 15000, 
          easing: 'easeOutQuad'
        });
      }

      setInterval(actualizarEstrellas, 5000);
      actualizarEstrellas();
    </script>
  </body>
</html>
