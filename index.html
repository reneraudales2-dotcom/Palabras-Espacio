<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - El Espacio</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
  </head>
  <body>
    <a-scene background="color: #000000" vr-mode-ui="enabled: false">
      <a-sky color="#000000"></a-sky>

      <a-entity light="type: ambient; intensity: 0.4"></a-entity>
      <a-entity light="type: point; intensity: 1.2; position: 0 10 5"></a-entity>

      <a-entity position="0 2 15">
        <a-camera look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearEstrella(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error en la conexión estelar:", error);
        }
      }

      function crearEstrella(palabra) {
        const universo = document.querySelector('#universo');
        
        // Paleta de colores de alta visibilidad
        const colores = ['#00f2ff', '#ff00ff', '#00ffaa', '#ffcc00', '#ffffff'];
        const colorAzar = colores[Math.floor(Math.random() * colores.length)];

        const x = (Math.random() - 0.5) * 45;
        const y = (Math.random() * 18) - 2;
        const z = (Math.random() - 0.5) * 12;

        const grupo = document.createElement('a-entity');
        grupo.setAttribute('position', `${x} ${y} -90`); 

        // 1. Núcleo de la estrella
        const esfera = document.createElement('a-sphere');
        esfera.setAttribute('radius', '0.18');
        esfera.setAttribute('color', '#fff');
        esfera.setAttribute('material', `emissive: ${colorAzar}; emissiveIntensity: 10`);

        // 2. CAPA DE COLOR (Borde/Resplandor detrás)
        const borde = document.createElement('a-text');
        borde.setAttribute('value', palabra);
        borde.setAttribute('align', 'center');
        borde.setAttribute('position', '0 1.4 -0.05');
        borde.setAttribute('scale', '11 11 11'); 
        borde.setAttribute('color', colorAzar);
        borde.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        borde.setAttribute('shader', 'msdf');
        borde.setAttribute('negate', 'false');
        borde.setAttribute('opacity', '0.8');

        // 3. CAPA BLANCA (Texto principal al frente para lectura)
        const textoPrincipal = document.createElement('a-text');
        textoPrincipal.setAttribute('value', palabra);
        textoPrincipal.setAttribute('align', 'center');
        textoPrincipal.setAttribute('position', '0 1.4 0');
        textoPrincipal.setAttribute('scale', '10 10 10');
        textoPrincipal.setAttribute('color', '#FFFFFF');
        textoPrincipal.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        textoPrincipal.setAttribute('shader', 'msdf');
        textoPrincipal.setAttribute('negate', 'false');

        grupo.appendChild(esfera);
        grupo.appendChild(borde);
        grupo.appendChild(textoPrincipal);
        universo.appendChild(grupo);

        // Animación suave de llegada
        grupo.setAttribute('animation', {
          property: 'position',
          to: `${x} ${y} ${z}`,
          dur: 8500,
          easing: 'easeOutExpo'
        });
      }

      setInterval(actualizarEstrellas, 5000);
      actualizarEstrellas();
    </script>
  </body>
</html>
