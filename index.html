<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - El Espacio</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; cursor: grab; }
      body:active { cursor: grabbing; }
    </style>
  </head>
  <body>
    <a-scene background="color: #000000" vr-mode-ui="enabled: false">
      <a-sky color="#000000"></a-sky>
      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      
      <a-entity position="0 2 25">
        <a-camera look-controls="enabled: true" wasd-controls="enabled: true"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearEstrella(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error estelar:", error);
        }
      }

      function crearEstrella(palabra) {
        const universo = document.querySelector('#universo');
        const colores = ['#00f2ff', '#ff00ff', '#00ffaa', '#ffcc00', '#0077ff'];
        const colorAzar = colores[Math.floor(Math.random() * colores.length)];

        const x = (Math.random() - 0.5) * 110;
        const y = (Math.random() * 45) - 10;
        const z = (Math.random() - 0.5) * 60;

        const grupo = document.createElement('a-entity');
        grupo.setAttribute('position', `${x} ${y} -150`); 

        // 1. ESTRELLA (Luz de referencia)
        const esfera = document.createElement('a-sphere');
        esfera.setAttribute('radius', '0.15');
        esfera.setAttribute('color', colorAzar);
        esfera.setAttribute('material', `emissive: ${colorAzar}; emissiveIntensity: 5`);

        // 2. EL TEXTO DEFINITIVO (Relleno negro + Borde blanco + Glow de color)
        // Usamos una sola capa para evitar que las letras se borren entre sí
        const texto = document.createElement('a-text');
        texto.setAttribute('value', palabra);
        texto.setAttribute('align', 'center');
        texto.setAttribute('position', '0 2.5 0');
        texto.setAttribute('scale', '16 16 16');
        
        // CONFIGURACIÓN DE COLOR E INTERIOR
        texto.setAttribute('color', '#000000'); // INTERIOR NEGRO
        texto.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        texto.setAttribute('shader', 'msdf');
        texto.setAttribute('negate', 'false');
        
        // BORDE BLANCO GRUESO (Para que la letra se vea hueca y nítida)
        texto.setAttribute('outline-width', '0.15');
        texto.setAttribute('outline-color', '#FFFFFF');

        // RESPLANDOR EXTERIOR (Añadimos sombra de color para el efecto neón)
        // Esto crea el efecto de color sin ensuciar el interior negro
        texto.setAttribute('anchor', 'center');

        grupo.appendChild(esfera);
        grupo.appendChild(texto);
        universo.appendChild(grupo);

        grupo.setAttribute('animation', {
          property: 'position',
          to: `${x} ${y} ${z}`,
          dur: 12000,
          easing: 'easeOutExpo'
        });
      }

      setInterval(actualizarEstrellas, 5000);
      actualizarEstrellas();
    </script>
  </body>
</html>
