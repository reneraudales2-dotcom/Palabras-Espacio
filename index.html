<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - Colores Neón</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
  </head>
  <body>
    <a-scene background="color: #000000" vr-mode-ui="enabled: false">
      
      <a-sky src="https://cdn.glitch.global/e8229b46-0b13-43c3-8a35-430c00711915/nebulosa_profunda.jpg?v=1716386623" opacity="0.5" rotation="0 -90 0"></a-sky>
      
      <a-entity light="type: ambient; intensity: 1.5"></a-entity>
      
      <a-entity position="0 2 25">
        <a-camera look-controls="enabled: true" wasd-controls="enabled: true"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      // URL de tu Google Sheet (Asegúrate que esté publicado como CSV)
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          // Separamos por líneas y quitamos la primera (encabezado)
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearPalabraColor(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error de carga:", error);
        }
      }

      function crearPalabraColor(palabra) {
        const universo = document.querySelector('#universo');
        
        // Paleta de colores neón al azar
        const colores = ['#00f2ff', '#ff00ff', '#00ffaa', '#ffcc00', '#0077ff', '#ff3300'];
        const colorElegido = colores[Math.floor(Math.random() * colores.length)];

        const x = (Math.random() - 0.5) * 100;
        const y = (Math.random() * 40) - 5;
        const z = (Math.random() - 0.5) * 60;

        const grupo = document.createElement('a-entity');
        grupo.setAttribute('position', `${x} ${y} -150`); 

        const texto = document.createElement('a-text');
        texto.setAttribute('value', palabra);
        texto.setAttribute('align', 'center');
        texto.setAttribute('scale', '25 25 25');
        
        // CONFIGURACIÓN PARA QUE NO SE VEA EL BLOQUE BLANCO
        texto.setAttribute('font', 'roboto'); // Fuente interna de A-Frame
        texto.setAttribute('shader', 'msdf');
        texto.setAttribute('negate', 'false'); // Esto hace que el fondo sea transparente
        texto.setAttribute('color', colorElegido); // La letra toma el color neón
        
        // Añadimos un pequeño borde para que se vea nítido
        texto.setAttribute('outline-width', '0.1');
        texto.setAttribute('outline-color', '#000000');

        grupo.appendChild(texto);
        universo.appendChild(grupo);

        // Animación de vuelo
        grupo.setAttribute('animation', {
          property: 'position',
          to: `${x} ${y} ${z}`,
          dur: 15000,
          easing: 'easeOutQuad'
        });
      }

      setInterval(actualizarEstrellas, 5000);
      actualizarEstrellas();
    </script>
  </body>
</html>
