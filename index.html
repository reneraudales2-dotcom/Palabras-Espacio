<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Muro de Estrellas - El Espacio</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene>
      <a-sky color="#000005"></a-sky>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: point; intensity: 1.5; position: 0 10 0"></a-entity>

      <a-entity position="0 2 15">
        <a-camera look-controls="enabled: true" wasd-controls="enabled: false"></a-camera>
      </a-entity>

      <a-entity id="universo"></a-entity>
    </a-scene>

    <script>
      const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRImd_PrZMPLBtYUtJ97nZAhPWeiH3Rttk_SpJv0BQZYEHJh9a4tIX33jGaMg7TtYxzUGeL8jupfvkK/pub?output=csv'; 
      let palabrasProcesadas = new Set();

      async function actualizarEstrellas() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const data = await response.text();
          const filas = data.split('\n').slice(1).filter(f => f.trim() !== ""); 

          filas.forEach(fila => {
            const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const palabra = columnas[1]?.replace(/"/g, '').trim().toUpperCase(); 

            if (palabra && !palabrasProcesadas.has(palabra)) {
              crearEstrella(palabra);
              palabrasProcesadas.add(palabra);
            }
          });
        } catch (error) {
          console.error("Error al conectar con la base de datos espacial:", error);
        }
      }

     function crearEstrella(palabra) {
  const universo = document.querySelector('#universo');
  
  // Paleta de colores espaciales de alto contraste
  const colores = ['#00f2ff', '#ff00ff', '#00ffaa', '#ffcc00', '#ffffff'];
  const colorAzar = colores[Math.floor(Math.random() * colores.length)];

  const x = (Math.random() - 0.5) * 45;
  const y = (Math.random() * 18) - 2;
  const z = (Math.random() - 0.5) * 12;

  const grupo = document.createElement('a-entity');
  grupo.setAttribute('position', `${x} ${y} -85`); 

  // Esfera con brillo intenso (Emissive)
  const esfera = document.createElement('a-sphere');
  esfera.setAttribute('radius', '0.18');
  esfera.setAttribute('color', '#fff');
  esfera.setAttribute('material', `emissive: ${colorAzar}; emissiveIntensity: 8`);

  // Texto en Alta Definición (MSDF)
  const texto = document.createElement('a-text');
  texto.setAttribute('value', palabra);
  texto.setAttribute('align', 'center');
  texto.setAttribute('position', '0 1.3 0');
  texto.setAttribute('scale', '9 9 9'); // Tamaño aumentado para legibilidad
  texto.setAttribute('color', colorAzar);
  texto.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
  texto.setAttribute('shader', 'msdf');
  texto.setAttribute('negate', 'false');

  // Segunda capa de texto para efecto de resplandor (Glow)
  const resplandor = document.createElement('a-text');
  resplandor.setAttribute('value', palabra);
  resplandor.setAttribute('align', 'center');
  resplandor.setAttribute('position', '0 1.3 -0.02');
  resplandor.setAttribute('scale', '9.5 9.5 9.5');
  resplandor.setAttribute('color', colorAzar);
  resplandor.setAttribute('opacity', '0.3');

  grupo.appendChild(esfera);
  grupo.appendChild(texto);
  grupo.appendChild(resplandor);
  universo.appendChild(grupo);

  // Animación suave de entrada
  grupo.setAttribute('animation', {
    property: 'position',
    to: `${x} ${y} ${z}`,
    dur: 7500,
    easing: 'easeOutQuart'
  });
}
      setInterval(actualizarEstrellas, 5000);
    </script>
  </body>
</html>
